name: iOS Tests
on:
  push:
    branches: [ "main" ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-tests.yml'

jobs:
  test:
    name: Run Unit and UI Tests
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS Simulator Runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b

      - name: Run Tests
        working-directory: "ios/Positive Only Social"
        run: |
          xcodebuild test \
            -project "Positive Only Social.xcodeproj" \
            -scheme "Positive Only Social" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
          | tee xcodebuild.log | xcpretty
          exit ${PIPESTATUS[0]}

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: "ios/Positive Only Social/xcodebuild.log"