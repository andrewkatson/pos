name: Android Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        working-directory: ./android/PositiveOnlySocial
        run: chmod +x gradlew

      - name: Run Unit Tests
        working-directory: ./android/PositiveOnlySocial
        run: ./gradlew test

  android-test:
    name: Run Instrumentation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        working-directory: ./android/PositiveOnlySocial
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: ./android/PositiveOnlySocial
        run: ./gradlew assembleDebug

      - name: Build instrumentation test APK
        working-directory: ./android/PositiveOnlySocial
        run: ./gradlew assembleAndroidTest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run tests on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app android/PositiveOnlySocial/app/build/outputs/apk/debug/app-debug.apk \
            --test android/PositiveOnlySocial/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=tokay,version=35,locale=en,orientation=portrait \
            --timeout 15m