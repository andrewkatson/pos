name: Android Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        working-directory: ./android/PositiveOnlySocial
        run: chmod +x gradlew

      - name: Run Unit Tests
        working-directory: ./android/PositiveOnlySocial
        run: ./gradlew test

  android-test:
    name: Run Instrumentation Tests
    runs-on: macos-15
    strategy:
      matrix:
        api-level: [29]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        working-directory: ./android/PositiveOnlySocial
        run: chmod +x gradlew

      - name: Run Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: arm64-v8a
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096
          disable-animations: true
          emulator-boot-timeout: 600
          script: cd android/PositiveOnlySocial && ./gradlew connectedAndroidTest